<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi prise de réservation — Suivi Réservations</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0a0a0a; --surface:#111; --border:#2a2a2a; --border-hi:#3a3a3a;
      --gold:#f0b429; --gold-dim:#a07010; --gold-light:#ffd166;
      --blue:#3b9eff; --blue-dim:#1a5fa0;
      --text:#f0f0f0; --text-dim:#888; --text-faint:#444;
      --row-alt:#0d0d0d; --row-hover:#1a1a1a; --row-total:#161616;
      --font-title:'Bebas Neue',sans-serif; --font-ui:'Nunito',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;padding:40px 48px 80px;}

    .back{display:inline-flex;align-items:center;gap:8px;color:var(--gold);text-decoration:none;font-size:16px;font-weight:800;letter-spacing:0.05em;margin-bottom:40px;opacity:0.8;transition:opacity 0.2s;}
    .back:hover{opacity:1;}

    .page-title{font-family:var(--font-title);font-size:90px;color:var(--gold);letter-spacing:0.06em;line-height:1;margin-bottom:8px;text-shadow:0 0 40px rgba(240,180,41,0.3);}
    .page-sub{font-size:20px;color:var(--text-dim);font-weight:700;margin-bottom:44px;letter-spacing:0.04em;}

    /* ── Filtres ── */
    .filters{
      background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:28px 32px;margin-bottom:36px;
      display:flex;flex-wrap:wrap;gap:24px;align-items:flex-end;
    }
    .fg{display:flex;flex-direction:column;gap:8px;}
    .fg label{font-family:var(--font-title);font-size:22px;color:var(--gold-light);letter-spacing:0.1em;}
    .fg select{
      background:var(--bg);border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-family:var(--font-ui);font-size:17px;font-weight:700;
      padding:12px 18px;min-width:280px;outline:none;transition:border-color 0.2s;
      cursor:pointer;
    }
    .fg select:focus{border-color:var(--gold);}
    .fg select option{background:#1a1a1a;}

    /* ── Indicateur de contexte ── */
    .context-bar{
      display:flex;align-items:center;gap:16px;
      margin-bottom:28px;
      font-family:var(--font-title);font-size:28px;
      color:var(--text-dim);letter-spacing:0.06em;
    }
    .context-bar .ctx-val{color:var(--gold-light);}
    .context-bar .ctx-nb{
      font-size:16px;font-family:var(--font-ui);font-weight:700;
      color:var(--text-faint);margin-left:8px;
    }

    /* ── Tableau croisé ── */
    .table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);}
    table{width:100%;border-collapse:collapse;}

    /* En-tête années */
    thead tr{background:#161616;border-bottom:2px solid var(--gold);}
    thead th{
      font-family:var(--font-title);font-size:28px;color:var(--gold-light);
      letter-spacing:0.1em;padding:22px 28px;text-align:right;white-space:nowrap;
      border-right:1px solid var(--border);
    }
    thead th:first-child{text-align:left;font-size:22px;color:var(--text-faint);}
    thead th:last-child{border-right:none;}

    /* Lignes mois */
    tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}
    tbody tr:nth-child(even){background:var(--row-alt);}
    tbody tr:hover{background:var(--row-hover);}
    tbody td{
      padding:17px 28px;font-size:18px;font-weight:700;
      border-right:1px solid var(--border);text-align:right;
    }
    tbody td:last-child{border-right:none;}
    tbody td:first-child{
      text-align:left;font-family:var(--font-title);font-size:24px;
      color:var(--gold-light);letter-spacing:0.08em;
    }
    /* Cellule vide (pas de données) */
    td.empty{color:var(--text-faint);font-weight:600;font-size:16px;}
    /* Cellule avec valeur */
    td.has-val{color:var(--text);}
    /* Cellule mois en cours */
    td.current-month{color:var(--gold);font-weight:900;}

    /* Ligne total annuel */
    tfoot tr{background:var(--row-total);border-top:2px solid var(--gold);}
    tfoot td{
      padding:20px 28px;
      font-family:var(--font-title);font-size:26px;
      color:var(--gold);letter-spacing:0.08em;
      border-right:1px solid var(--border);text-align:right;
    }
    tfoot td:last-child{border-right:none;}
    tfoot td:first-child{
      text-align:left;color:var(--gold);font-size:24px;letter-spacing:0.12em;
    }

    /* ── États de chargement ── */
    .loading{padding:80px;text-align:center;color:var(--text-dim);font-size:22px;font-weight:700;}

    /* ── Footer ── */
    .site-footer{margin-top:60px;text-align:center;font-family:var(--font-title);letter-spacing:0.15em;}
    .site-footer .line1{font-size:0.72rem;color:var(--text-faint);}
    .site-footer .version{font-size:1rem;color:var(--gold-dim);letter-spacing:0.25em;display:block;margin-top:0.3rem;}
  </style>
</head>
<body>

  <a class="back" href="/">← Accueil</a>
  <div class="page-title">SUIVI PRISE DE RÉSERVATION</div>
  <div class="page-sub">Versements cumulés par mois et année de réservation</div>

  <!-- Filtres -->
  <div class="filters">
    <div class="fg">
      <label>VOIR PAR</label>
      <select id="f-type" onchange="onTypeChange()">
        <option value="all">Tous — Vue globale</option>
        <option value="owner">Par propriétaire</option>
        <option value="listing">Par appartement</option>
      </select>
    </div>
    <div class="fg" id="fg-owner" style="display:none">
      <label>PROPRIÉTAIRE</label>
      <select id="f-owner" onchange="onFilterChange()">
        <option value="">— Choisir —</option>
      </select>
    </div>
    <div class="fg" id="fg-listing" style="display:none">
      <label>APPARTEMENT</label>
      <select id="f-listing" onchange="onFilterChange()">
        <option value="">— Choisir —</option>
      </select>
    </div>
  </div>

  <!-- Contexte actif -->
  <div class="context-bar" id="context-bar" style="display:none">
    <span>FILTRE ACTIF :</span>
    <span class="ctx-val" id="ctx-val">—</span>
    <span class="ctx-nb" id="ctx-nb"></span>
  </div>

  <!-- Tableau -->
  <div class="table-wrap">
    <div class="loading" id="loading">Chargement…</div>
    <table id="tbl" style="display:none">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>

  <footer class="site-footer">
    <span class="line1">SUIVI RÉSERVATIONS · PORT 3010</span>
    <span class="version">v0.1.4</span>
  </footer>

  <script>
    const MOIS = ['JANVIER','FÉVRIER','MARS','AVRIL','MAI','JUIN',
                  'JUILLET','AOÛT','SEPTEMBRE','OCTOBRE','NOVEMBRE','DÉCEMBRE'];

    let allData   = [];   // toutes les réservations brutes
    let owners    = [];
    let listings  = [];

    // ── Chargement initial ────────────────────────────────────────────────────
    async function init() {
      try {
        const [rRes, rOwn, rLst] = await Promise.all([
          fetch('/api/reservations'),
          fetch('/api/owners'),
          fetch('/api/listings')
        ]);
        allData  = await rRes.json();
        owners   = await rOwn.json();
        listings = await rLst.json();

        // Peupler selects
        const selOwn = document.getElementById('f-owner');
        owners.filter(o => o.nb_res > 0).forEach(o => {
          const opt = document.createElement('option');
          opt.value = o.id; opt.textContent = o.nom;
          selOwn.appendChild(opt);
        });

        const selLst = document.getElementById('f-listing');
        listings.filter(l => l.nb_res > 0).forEach(l => {
          const opt = document.createElement('option');
          opt.value = l.id; opt.textContent = l.nom;
          selLst.appendChild(opt);
        });

        document.getElementById('loading').style.display = 'none';
        const _sf = JSON.parse(localStorage.getItem('filters_suivi')||'{}');
        if (_sf.type && _sf.type !== 'all') {
          document.getElementById('f-type').value = _sf.type;
          document.getElementById('fg-owner').style.display   = _sf.type === 'owner'   ? '' : 'none';
          document.getElementById('fg-listing').style.display = _sf.type === 'listing' ? '' : 'none';
          if (_sf.owner)   document.getElementById('f-owner').value   = _sf.owner;
          if (_sf.listing) document.getElementById('f-listing').value = _sf.listing;
          onFilterChange();
        } else {
          buildTable(allData, 'Toutes les réservations');
        }
      } catch(e) {
        document.getElementById('loading').textContent = 'Erreur : ' + e.message;
      }
    }

    // ── Changement de type de filtre ──────────────────────────────────────────
    function onTypeChange() {
      const type = document.getElementById('f-type').value;
      document.getElementById('fg-owner').style.display   = type === 'owner'   ? '' : 'none';
      document.getElementById('fg-listing').style.display = type === 'listing' ? '' : 'none';
      // Remettre les selects à zéro
      document.getElementById('f-owner').value   = '';
      document.getElementById('f-listing').value = '';
      localStorage.setItem('filters_suivi', JSON.stringify({type, owner:'', listing:''}));

      if (type === 'all') {
        document.getElementById('context-bar').style.display = 'none';
        buildTable(allData, null);
      }
    }

    // ── Changement de valeur de filtre ────────────────────────────────────────
    function onFilterChange() {
      const type    = document.getElementById('f-type').value;
      const ownerId = document.getElementById('f-owner').value;
      const lstId   = document.getElementById('f-listing').value;
      localStorage.setItem('filters_suivi', JSON.stringify({type, owner:ownerId, listing:lstId}));

      if (type === 'owner' && ownerId) {
        const owner = owners.find(o => o.id === ownerId);
        const filtered = allData.filter(r => {
          // on filtre via listing_id → on cherche les listings de ce propriétaire
          const lst = listings.find(l => l.id === r.listing_id);
          return lst && lst.owner_id === ownerId;
        });
        showContext(owner ? owner.nom : ownerId, filtered.length + ' réservations');
        buildTable(filtered, owner ? owner.nom : ownerId);

      } else if (type === 'listing' && lstId) {
        const lst = listings.find(l => l.id === lstId);
        const filtered = allData.filter(r => r.listing_id === lstId);
        showContext(lst ? lst.nom : lstId, filtered.length + ' réservations');
        buildTable(filtered, lst ? lst.nom : lstId);
      }
    }

    function showContext(label, nb) {
      document.getElementById('ctx-val').textContent = label;
      document.getElementById('ctx-nb').textContent  = '(' + nb + ')';
      document.getElementById('context-bar').style.display = '';
    }

    // ── DEBUG temporaire ─────────────────────────────────────────────────────
    function debugData(data, label) {
      console.group('DEBUG — ' + (label||'all') + ' (' + data.length + ' résa)');
      console.log('Sans booking_date:', data.filter(r => !r.booking_date).length);
      console.log('versement null/undef:', data.filter(r => r.versement == null).length);
      console.log('versement === 0:', data.filter(r => r.versement === 0).length);
      // années trouvées dans booking_date
      const yrs = {};
      data.forEach(r => {
        if (r.booking_date) {
          const y = r.booking_date.substring(0,4);
          yrs[y] = (yrs[y]||0) + 1;
        }
      });
      console.log('Années dans booking_date:', yrs);
      console.table(data.slice(0,10).map(r=>({id:r.id,booking_date:r.booking_date,versement:r.versement,listing_id:r.listing_id})));
      console.groupEnd();
    }

    // ── Construction du tableau croisé ────────────────────────────────────────
    function buildTable(data, label) {
      debugData(data, label);
      // Déterminer les années présentes (toutes, sans filtre arbitraire)
      const yearsSet = new Set();
      data.forEach(r => {
        if (r.booking_date) {
          const y = r.booking_date.substring(0, 4);
          if (y && parseInt(y, 10) >= 2024) yearsSet.add(y);
        }
      });
      const years = [...yearsSet].sort();

      if (years.length === 0) {
        document.getElementById('tbl').style.display = 'none';
        document.getElementById('loading').style.display = '';
        document.getElementById('loading').textContent = 'Aucune donnée disponible pour cette sélection.';
        return;
      }

      // Construire la matrice [mois][année] = somme versements
      // mois : 0=jan … 11=dec
      const matrix = {};
      for (let m = 0; m < 12; m++) {
        matrix[m] = {};
        years.forEach(y => { matrix[m][y] = null; });
      }

      data.forEach(r => {
        if (!r.booking_date || r.versement == null) return;
        const y = r.booking_date.substring(0, 4);
        const m = parseInt(r.booking_date.substring(5, 7), 10) - 1; // 0-based
        if (!years.includes(y) || m < 0 || m > 11) return;
        if (matrix[m][y] === null) matrix[m][y] = 0;
        matrix[m][y] += Number(r.versement);
      });

      // Totaux par année
      const totals = {};
      years.forEach(y => {
        totals[y] = 0;
        for (let m = 0; m < 12; m++) {
          if (matrix[m][y] !== null) totals[y] += matrix[m][y];
        }
      });

      // Mois/année courants pour mise en valeur
      const now   = new Date();
      const curY  = String(now.getFullYear());
      const curM  = now.getMonth(); // 0-based

      // ── THEAD ──
      let thead = '<tr><th>MOIS</th>';
      years.forEach(y => { thead += `<th>${y}</th>`; });
      thead += '</tr>';
      document.getElementById('thead').innerHTML = thead;

      // ── TBODY ──
      let tbody = '';
      for (let m = 0; m < 12; m++) {
        tbody += '<tr>';
        tbody += `<td>${MOIS[m]}</td>`;
        years.forEach(y => {
          const val = matrix[m][y];
          const isCur = (y === curY && m === curM);
          if (val === null) {
            tbody += `<td class="empty${isCur?' current-month':''}">—</td>`;
          } else {
            tbody += `<td class="has-val${isCur?' current-month':''}">${fmt(val)}&nbsp;€</td>`;
          }
        });
        tbody += '</tr>';
      }
      document.getElementById('tbody').innerHTML = tbody;

      // ── TFOOT ──
      let tfoot = '<tr><td>TOTAL</td>';
      years.forEach(y => {
        tfoot += `<td>${fmt(totals[y])}&nbsp;€</td>`;
      });
      tfoot += '</tr>';
      document.getElementById('tfoot').innerHTML = tfoot;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('tbl').style.display = 'table';
    }

    function fmt(v) {
      if (v == null || isNaN(v)) return '—';
      return v.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    init();
  </script>
</body>
</html>
